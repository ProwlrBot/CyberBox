name: CyberSandbox Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cybersandbox/**'
      - '.github/workflows/cybersandbox-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cybersandbox/**'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Push :latest tag'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: prowlrbot/cybersandbox

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write   # trivy SARIF upload
      id-token: write          # cosign keyless OIDC signing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build locally first so we can smoke-test and scan before pushing.
      - name: Build (local)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: cybersandbox
          load: true
          push: false
          tags: cybersandbox:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          set -euo pipefail
          echo "::group::version pin audit"
          docker run --rm --entrypoint sh cybersandbox:ci -c '
            set -e
            for bin in nuclei subfinder httpx katana dalfox ffuf gitleaks trufflehog \
                      prowl csbx invoke-claude invoke-ollama; do
              command -v "$bin" >/dev/null || { echo "MISSING: $bin"; exit 1; }
              echo "  [ok] $bin"
            done
            csbx --help >/dev/null
            prowl status >/dev/null
          '
          echo "::endgroup::"

      # spec-015: publish image size as a per-release metric.
      # Methodology: cybersandbox/docs/image-size-audit.md
      # Only built-in env vars (GITHUB_REF, GITHUB_SHA) are interpolated
      # into the run script — no user-controlled inputs.
      - name: Image size metric
        id: size
        env:
          GH_REF: ${{ github.ref }}
          GH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Human-readable size (e.g. "8.62GB").
          size_h="$(docker images --format '{{.Size}}' cybersandbox:ci | head -n1)"
          # Exact byte count (machine-readable for trend dashboards).
          size_b="$(docker image inspect cybersandbox:ci --format '{{.Size}}')"
          # Layer count — useful regression signal (lots of small layers
          # often hide cache leaks).
          layers="$(docker image inspect cybersandbox:ci --format '{{len .RootFS.Layers}}')"

          echo "size_human=${size_h}" >> "$GITHUB_OUTPUT"
          echo "size_bytes=${size_b}" >> "$GITHUB_OUTPUT"
          echo "layer_count=${layers}" >> "$GITHUB_OUTPUT"

          # Machine-readable artifact for downstream trend tracking.
          {
            echo "image=cybersandbox:ci"
            echo "ref=${GH_REF}"
            echo "sha=${GH_SHA}"
            echo "size_human=${size_h}"
            echo "size_bytes=${size_b}"
            echo "layer_count=${layers}"
          } > image-size.txt

          {
            echo "### Image size"
            echo ''
            echo "| metric | value |"
            echo "| --- | --- |"
            echo "| size (human)  | ${size_h} |"
            echo "| size (bytes)  | ${size_b} |"
            echo "| layer count   | ${layers} |"
            echo ''
            echo "_Methodology: cybersandbox/docs/image-size-audit.md_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image size artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v5.0.0
        with:
          name: cybersandbox-image-size
          path: image-size.txt
          retention-days: 90

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cybersandbox:ci
          scanners: vuln   # skip secret-scanner: nuclei/metasploit payloads are not secrets
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'   # report, never block (see trivy-gate for blocking)
          vuln-type: os,library
          timeout: 30m
          
      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Trivy gate (fail on CRITICAL fixed)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: cybersandbox:ci
          scanners: vuln   # skip secret-scanner: nuclei/metasploit payloads are not secrets
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library
          trivyignores: cybersandbox/.trivyignore

      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: cybersandbox
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signing via Fulcio/Rekor: binds the image digest to this
      # workflow's OIDC identity. Sign by digest so we sign content, not
      # mutable tags.
      - name: Sign image (cosign keyless)
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Image summary
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### Published image"
            echo '```'
            echo "$TAGS"
            echo ''
            echo "digest: $DIGEST"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Independent verification job: proves the signed image can be validated
  # from scratch (fresh runner, no build cache), and that the published SBOM
  # is non-empty. Runs on push/tag/workflow_dispatch, never on PRs (nothing
  # was pushed).
  verify-supply-chain:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write   # cosign verify may hit Rekor with identity

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GHCR (read)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Resolve image digest
        id: resolve
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          # Use the short-sha tag produced by docker/metadata-action.
          short="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          ref="${REGISTRY}/${IMAGE_NAME}:sha-${short}"
          digest="$(docker buildx imagetools inspect "$ref" --format '{{ .Manifest.Digest }}')"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${ref} -> ${digest}"

      - name: Verify cosign signature
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
          IDENTITY_REGEX: "^https://github.com/${{ github.repository }}/.github/workflows/cybersandbox-build.yml@refs/"
        run: |
          set -euo pipefail
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "${IDENTITY_REGEX}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            | tee cosign-verify.json
          test -s cosign-verify.json

      - name: Verify SBOM is non-empty
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          set -euo pipefail
          # buildx attaches the SBOM as an OCI referrer; inspect it directly.
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}" \
            --format '{{ json .SBOM }}' > sbom.json
          bytes="$(wc -c < sbom.json)"
          echo "SBOM payload bytes: ${bytes}"
          if [ "${bytes}" -lt 64 ]; then
            echo "SBOM payload is suspiciously small (${bytes} bytes)" >&2
            head -c 2000 sbom.json || true
            exit 1
          fi
          if ! grep -q -E '"SPDXID"|"spdxVersion"|"bomFormat"' sbom.json; then
            echo "SBOM does not contain SPDX or CycloneDX markers" >&2
            head -c 2000 sbom.json || true
            exit 1
          fi

      - name: Supply-chain summary
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          {
            echo "### Supply-chain verification"
            echo '```'
            echo "image:  ${IMAGE}"
            echo "digest: ${DIGEST}"
            echo "signed: yes (cosign keyless / Fulcio / Rekor)"
            echo "sbom:   present"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
