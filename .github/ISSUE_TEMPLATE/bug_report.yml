name: Bug Report
description: Report a bug in CyberSandbox
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. docker compose up
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: e.g. Ubuntu 24.04, macOS 15, Windows 11 WSL2
  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: e.g. Docker 27.0
