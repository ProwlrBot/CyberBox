name: Plugin Request
description: Request a new plugin for the csbx registry
labels: [plugin-request]
body:
  - type: input
    id: name
    attributes:
      label: Plugin name
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Source repo URL
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Plugin type
      options:
        - tool
        - wordlist
        - nuclei-templates
        - theme
        - config
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What does it do?
    validations:
      required: true
  - type: input
    id: size
    attributes:
      label: Approximate download size
      placeholder: e.g. 50MB
