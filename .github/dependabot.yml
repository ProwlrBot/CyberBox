# Dependabot configuration for CyberBox.
# Groups related updates so we don't get a tidal wave of PRs.
# Schedules are in America/Chicago (kdairatchi).
version: 2

updates:
  # GitHub Actions used across every workflow under .github/workflows/.
  # Daily because action CVEs (see tj-actions/changed-files) move fast and
  # SHA pins make drift easy to miss visually.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      docker-actions:
        patterns:
          - "docker/*"
      sigstore-actions:
        patterns:
          - "sigstore/*"
      github-official:
        patterns:
          - "actions/*"
          - "github/*"
      security-actions:
        patterns:
          - "aquasecurity/*"
          - "gitleaks/*"
          - "trufflesecurity/*"
    ignore:
      # pnpm/action-setup v6 drops `version:` input and requires pnpm 10+.
      # Revisit when we migrate to pnpm 11. See #7.
      - dependency-name: "pnpm/action-setup"
        update-types: ["version-update:semver-major"]

  # CyberSandbox base image (FROM pin in cybersandbox/Dockerfile).
  - package-ecosystem: "docker"
    directory: "/cybersandbox"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"

  # JS SDK (sdk/js).
  - package-ecosystem: "npm"
    directory: "/sdk/js"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
    # Split groups by update-type so a single major bump (e.g. vitest 1→4)
    # doesn't lock the whole group into one atomic-and-unmergeable PR.
    groups:
      js-dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      js-dev-major:
        dependency-type: "development"
        update-types: ["major"]
      js-prod:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      js-prod-major:
        dependency-type: "production"
        update-types: ["major"]

  # Python SDK (sdk/python).
  - package-ecosystem: "pip"
    directory: "/sdk/python"
    schedule:
      interval: "weekly"
      day: "monday"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    labels:
      - "dependencies"
      - "python"
    groups:
      py-dev:
        dependency-type: "development"
      py-prod:
        dependency-type: "production"
