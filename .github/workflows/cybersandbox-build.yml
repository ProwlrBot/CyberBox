name: CyberSandbox Build & Push

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cybersandbox/**'
      - '.github/workflows/cybersandbox-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cybersandbox/**'
  workflow_dispatch:
    inputs:
      push_latest:
        description: 'Push :latest tag'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: prowlrbot/cybersandbox

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      security-events: write   # trivy SARIF upload
      id-token: write          # cosign keyless OIDC signing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Build locally first so we can smoke-test and scan before pushing.
      - name: Build (local)
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: cybersandbox
          load: true
          push: false
          tags: cybersandbox:ci
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          set -euo pipefail
          echo "::group::version pin audit"
          docker run --rm --entrypoint sh cybersandbox:ci -c '
            set -e
            for bin in nuclei subfinder httpx katana dalfox ffuf gitleaks trufflehog \
                      harbinger csbx invoke-claude invoke-ollama; do
              command -v "$bin" >/dev/null || { echo "MISSING: $bin"; exit 1; }
              echo "  [ok] $bin"
            done
            csbx --help >/dev/null
            harbinger status >/dev/null
          '
          echo "::endgroup::"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: cybersandbox:ci
          scanners: vuln   # skip secret-scanner: nuclei/metasploit payloads are not secrets
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'   # report, never block (see trivy-gate for blocking)
          vuln-type: os,library

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      - name: Trivy gate (fail on CRITICAL fixed)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: cybersandbox:ci
          scanners: vuln   # skip secret-scanner: nuclei/metasploit payloads are not secrets
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          vuln-type: os,library
          trivyignores: cybersandbox/.trivyignore

      - name: Push image
        id: push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: cybersandbox
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          provenance: true
          sbom: true

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      # Keyless signing via Fulcio/Rekor: binds the image digest to this
      # workflow's OIDC identity. Sign by digest so we sign content, not
      # mutable tags.
      - name: Sign image (cosign keyless)
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAGS" | while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            echo "cosign sign ${tag}@${DIGEST}"
            cosign sign --yes "${tag}@${DIGEST}"
          done

      - name: Image summary
        if: github.event_name != 'pull_request'
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "### Published image"
            echo '```'
            echo "$TAGS"
            echo ''
            echo "digest: $DIGEST"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  # Independent verification job: proves the signed image can be validated
  # from scratch (fresh runner, no build cache), and that the published SBOM
  # is non-empty. Runs on push/tag/workflow_dispatch, never on PRs (nothing
  # was pushed).
  verify-supply-chain:
    needs: [build]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read
      id-token: write   # cosign verify may hit Rekor with identity

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR (read)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Resolve image digest
        id: resolve
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          # Use the short-sha tag produced by docker/metadata-action.
          short="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          ref="${REGISTRY}/${IMAGE_NAME}:sha-${short}"
          digest="$(docker buildx imagetools inspect "$ref" --format '{{ .Manifest.Digest }}')"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Resolved ${ref} -> ${digest}"

      - name: Verify cosign signature
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
          IDENTITY_REGEX: "^https://github.com/${{ github.repository }}/.github/workflows/cybersandbox-build.yml@refs/"
        run: |
          set -euo pipefail
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "${IDENTITY_REGEX}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            | tee cosign-verify.json
          test -s cosign-verify.json

      - name: Verify SBOM is non-empty
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          set -euo pipefail
          # buildx attaches the SBOM as an OCI referrer; inspect it directly.
          docker buildx imagetools inspect "${IMAGE}@${DIGEST}" \
            --format '{{ json .SBOM }}' > sbom.json
          bytes="$(wc -c < sbom.json)"
          echo "SBOM payload bytes: ${bytes}"
          if [ "${bytes}" -lt 64 ]; then
            echo "SBOM payload is suspiciously small (${bytes} bytes)" >&2
            head -c 2000 sbom.json || true
            exit 1
          fi
          if ! grep -q -E '"SPDXID"|"spdxVersion"|"bomFormat"' sbom.json; then
            echo "SBOM does not contain SPDX or CycloneDX markers" >&2
            head -c 2000 sbom.json || true
            exit 1
          fi

      - name: Supply-chain summary
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DIGEST: ${{ steps.resolve.outputs.digest }}
        run: |
          {
            echo "### Supply-chain verification"
            echo '```'
            echo "image:  ${IMAGE}"
            echo "digest: ${DIGEST}"
            echo "signed: yes (cosign keyless / Fulcio / Rekor)"
            echo "sbom:   present"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
